<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Poem Generator</h1>
      </header>

      <form id="poem-generator-form">
        <input
          id="instructions"
          class="instructions"
          type="text"
          placeholder="Enter a theme for your poem..."
          autofocus
          required
          autocomplete="off"
        />
        <input class="submit-button" type="submit" value="Generate Poem" />
      </form>
      <div class="poem" id="poem">
        Poem will be hier
        <br />
        poem will be hier
      </div>

      <footer>
        This AI project was coded by
        <a href="" target="_blank">Khanina Nataliia</a>
        and is
        <a href="">open-sourced on GitHub</a>
        and
        <a href="">hosted on Netlify</a>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
